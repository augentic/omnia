# Install: `cargo install cargo-make`
# Help: https://sagiegurari.github.io/cargo-make/

extend = [{ path = "examples/Makefile.toml" }]

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

[config]
default_to_workspace = true
skip_core_tasks = true
skip_crate_env_info = true
skip_git_env_info = true
skip_rust_env_info = true

# -------------------------------------
# CI Checks
# -------------------------------------
[tasks.check]
dependencies = ["audit", "fmt", "lint", "outdated", "deps"]

[tasks.ci]
dependencies = ["fmt", "lint", "test", "test-seam", "test-docs", "docs", "vet", "outdated", "deny"]

# -------------------------------------
# Individual Actions
# -------------------------------------

# Audit
[tasks.audit]
command = "cargo"
args = ["audit"]

# Clean
[tasks.clean]
command = "cargo"
args = ["clean"]

# Deny
[tasks.deny]
command = "cargo"
args = ["deny", "--workspace", "check"]
install_crate = "cargo-deny"

# Deps
[tasks.deps]
script = '''
cargo +nightly udeps --all-targets
'''
install_crate = "cargo-udeps"
# args = ["machete", "--skip-target-dir"]
# install_crate = "cargo-machete"

# Fmt (fix in place)
[tasks.fmt]
script = "cargo +nightly fmt --all"

# Lint
[tasks.lint]
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]
install_crate = { rustup_component_name = "clippy" }

# Miri
[tasks.miri]
script = '''
cargo +nightly miri setup
cargo +nightly miri nextest run --no-tests=pass
'''

# Outdated
# The cap-* stack is deliberately held at 3.x to match wasmtime-wasi (see
# workspace Cargo.toml); drop the ignores when wasmtime-wasi moves to cap-std 4.
# thiserror is held at 2.0.18: 2.0.19's derive pulls syn 3 beside the
# ecosystem's syn 2, tripping the multiple-crate-versions lint.
[tasks.outdated]
script = '''
cargo outdated --workspace --exit-code 1 --depth 1 \
  --ignore cap-fs-ext --ignore cap-std --ignore cap-primitives \
  --ignore thiserror
'''
install_crate = "cargo-outdated"

# Test
[tasks.test]
command = "cargo"
args = ["nextest", "run", "--locked", "--all", "--all-features", "--no-tests=pass"]
env = { RUSTFLAGS = "-Dwarnings" }

# Seam tier: the consolidated guest–host suite, one process so the runtime
# fixtures (component, linker, InstancePre) are built once.
# `test-guests` lives in examples/Makefile.toml (extended above).
[tasks.test-seam]
dependencies = ["test-guests"]
command = "cargo"
args = ["test", "-p", "omnia-seam-suite", "--test", "seam"]

[tasks.docs]
command = "cargo"
args = ["doc", "--no-deps", "--workspace", "--all-features", "--locked"]

# Test Doc
[tasks.test-docs]
command = "cargo"
args = ["test", "--doc", "--all-features", "--workspace"]

# Vet
[tasks.vet]
script = '''
cargo vet regenerate imports
cargo vet regenerate exemptions
cargo vet regenerate unpublished
cargo vet --locked
'''
install_crate = "cargo-vet"

[tasks.publish]
command = "cargo"
args = ["publish", "--registry=augentic", "--allow-dirty", "--dry-run"]
