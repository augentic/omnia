schema: omnia

context: |
  Tech stack: Rust, WASM (wasm32-wasip2), Omnia SDK
  Architecture: Handler<P> pattern with provider trait bounds
  Testing: Rust integration tests, cargo test

rules:
  proposal:
    - "Identify the source: a git repository URL (for code analysis), a
      JIRA/ADO/Linear epic key (for requirements analysis), or Manual (feature
      work). This determines the workflow for downstream artifacts."
    - Capability names are crate names. For modified capabilities, use the
      existing spec folder name from .specify/specs/. For new capabilities, 
      choose a name that will be the crate name
  specs:
    - Use WHEN/THEN format for scenarios
    - Reference existing patterns before inventing new ones
    - Organize by handler using ## Handler: <name> sections
    - Each handler section includes Purpose, Requirements (with scenarios),
      Error Conditions, and Metrics
    - For update changes use ADDED/MODIFIED/REMOVED delta operations within 
      handler sections
  design:
    - Include Context section with Source field (jira-epic or source-code)
    - Document domain model entity/type definitions with field names, types, 
      wire names, and optionality
    - Document API contracts with method, path, request/response shapes
    - Document business logic per handler as tagged pseudocode ([domain], 
      [infrastructure], [mechanical]) with required provider traits per handler
    - Document external services name, type (API, managed table store, cache, 
      message broker), authentication
    - Document configuration with all config keys, descriptions, and defaults
    - Include Source Capabilities Summary checklist (Config, HttpRequest, 
      Publish, StateStore, Identity, TableStore, Broadcast)
    - Flag structural changes (type renames, handler splits/merges)
    - Use mermaid diagrams for entity relationships and flows
  tasks:
    - "For new crates (no existing Cargo.toml), structure tasks around the
      create-mode skill chain: 1) guest-writer, 2) crate-writer, 3) verify,
      4) code-reviewer. Do not list individual Rust code changes -- the
      skills handle file-level generation."
    - "For existing crate updates, structure tasks around the specific
      behavioral changes from the specs. crate-writer handles the code
      modifications."