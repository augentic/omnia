name: omnia
version: 1
description: Omnia workflow

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
        this solve? Why now?
      - **Source**: Identify where the requirements come from. Pick ONE:
        - **Repository**: URL of the repository to migrate (e.g.,
          `https://github.com/org/repo`). This triggers the RT workflow
          — the specs phase will clone the repo and run code-analyzer.
        - **Epic**: JIRA/ADO/Linear epic key (e.g., `ATR-7102`). This triggers
          the Omnia workflow — the specs phase will run epic-analyzer.
        - **Manual**: Requirements are described directly in this proposal.
          This is the default workflow — specs and design are written by hand.
      - **What Changes**: Bullet list of changes. Be specific about new
        capabilities, modifications, or removals. Mark breaking changes with
        **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each
          becomes a new `specs/<name>/spec.md`. Use kebab-case names 
          (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose 
          REQUIREMENTS are changing. Only include if spec-level behavior
          changes (not just implementation details). Each needs a delta spec
          file. Check `.specify/specs/` for existing spec names. Leave empty if
          no requirement changes.
        - For **Repository** or **Epic** sources, capabilities will be
          determined by the analyzer skill. List expected capabilities if
          known, but analyzer output takes precedence.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section creates the contract between proposal
      and specs phases. For manual sources, research existing specs before
      filling this in — each capability listed will need a corresponding spec
      file. For repository or epic sources, the analyzer discovers capabilities
      automatically.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" - 
      implementation details belong in design.md.

      This is the foundation - specs, design, and tasks all build on this.
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      First, read the proposal's **Source** section to determine the workflow:

      ---

      **RT path** (Source is a repository URL):

        1. Clone the source repository. Invoke `/rt:git-cloner` with
           arguments:
             <repo-url> legacy/ true
           This clones the repo into `legacy/<repo-name>` as a detached tree.
        2. Generate specs and design. Invoke `/rt:code-analyzer` with
           arguments:
             legacy/<repo-name> <change-dir>
           code-analyzer produces both `specs/` and `design.md` in a single
           pass.
        3. Review the generated specs for completeness and adjust if needed.
        4. Proceed to the next artifact. design.md was already produced by
           code-analyzer — the design phase will review/enrich it.

      ---

      **Omnia path** (Source is a JIRA/ADO/Linear epic key):

        Prerequisite: The Omnia plugin must be loaded for JIRA MCP access.

        1. Generate specs and design. Invoke `/plan:epic-analyzer` with
           arguments:
             <epic-key> <change-dir>
           epic-analyzer produces `proposal.md`, `specs/`, and `design.md`.
        2. Review the generated specs for completeness and adjust if needed.
        3. Proceed to the next artifact. design.md was already produced by
           epic-analyzer — the design phase will review/enrich it.

      ---

      **Manual path** (Source is "Manual" or absent):

        Create one spec file per capability listed in the proposal's
        Capabilities section.

        Guidelines:
          - New capabilities: use the exact kebab-case name from the proposal
          (specs/<capability>/spec.md).
          - Modified capabilities: use the existing spec folder name from
          .specify/specs/<capability>/ when creating the delta spec at
          specs/<capability>/spec.md.

        Delta operations (use ## headers):
          - **ADDED Requirements**: New capabilities
          - **MODIFIED Requirements**: Changed behavior - MUST include full 
            updated content.
          - **REMOVED Requirements**: Deprecated features - MUST include 
            **Reason** and **Migration**.
          - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

        Format requirements:
          - Each requirement: `### Requirement: <name>` followed by description
          - Use SHALL/MUST for normative requirements (avoid should/may)
          - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
          - **CRITICAL**: In delta specs (this template), scenarios MUST use
            exactly 4 hashtags (`####`). In full baseline specs organized
            under `## Handler:` sections (see references/specify.md),
            scenarios are one level deeper at `#####`. Using fewer hashtags
            or bullets will fail silently.
          - Every requirement MUST have at least one scenario.

        MODIFIED requirements workflow:
          1. Locate the existing requirement in 
            .specify/specs/<capability>/spec.md
          2. Copy the ENTIRE requirement block (from `### Requirement:`
            through all scenarios).
          3. Paste under `## MODIFIED Requirements` and edit to reflect new 
            behavior.
          4. Ensure header text matches exactly (whitespace-insensitive)

        Common pitfall: Using MODIFIED with partial content loses detail at
        archive time.

        If adding new concerns without changing existing behavior, use ADDED
        instead.

        Example:
          
        ```markdown
        ## ADDED Requirements

        ### Requirement: User can export data
        The system SHALL allow users to export their data in CSV format.

        #### Scenario: Successful export
        - **WHEN** user clicks "Export" button
        - **THEN** system downloads a CSV file with all user data

        ## REMOVED Requirements

        ### Requirement: Legacy export
        **Reason**: Replaced by new export system
        **Migration**: Use new export endpoint at /api/v2/export
        ```

        Specs should be testable - each scenario is a potential test case.

    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document to explain HOW to implement the change.

      Create full design if any of the following apply:
        - Cross-cutting change (multiple services/modules) or new
          architectural pattern
        - New external dependency or significant data model changes
        - Security, performance, or migration complexity
        - Ambiguity that benefits from technical decisions before coding
      
      If none of the above apply, create a minimal design.md noting that a full
      design is not warranted and referencing the proposal and specs:

      Required sections (see template):
        - **Context**: Source, purpose, background, and current state
        - **Domain Model**: Entity and type definitions with field names,
          types, wire names, and optionality
        - **API Contracts**: Endpoints with method, path, request/response
          shapes, and error responses
        - **External Services**: Name, type (API, table store, cache, message
          broker), authentication method
        - **Constants & Configuration**: All config keys with descriptions
          and defaults
        - **Business Logic**: Per-handler tagged pseudocode using [domain],
          [infrastructure], [mechanical] tags. Include required provider
          traits per handler.
        - **Publication & Timing Patterns**: Topics, message shapes, timing
        - **Implementation Constraints**: Platform or runtime constraints
        - **Source Capabilities Summary**: Checklist of required capabilities
        - **Dependencies**: External packages or services
        - **Risks / Open Questions**: Known risks and unresolved decisions
        - **Notes**: Additional observations

      Focus on the technical shape needed for implementation. Reference the
      proposal for motivation and specs for behavioral requirements. Use
      mermaid diagrams for entity relationships and flows.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be
      tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)

      Example:

      ```markdown
      ## 1. Setup
      - [ ] 1.1 Create new module structure
      - [ ] 1.2 Add dependencies to Cargo.toml

      ## 2. Core Implementation
      - [ ] 2.1 Implement data export function
      - [ ] 2.2 Add CSV formatting utilities
      ```

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Implement the tasks in tasks.md. Do not write Rust code directly --
    delegate to the skills below.

    Arguments (used by all skills):
    - CHANGE_ID: the name of this change (from specify status)
    - PROJECT_DIR: the project root (typically ".")
    - CRATE_NAME: the spec folder name (specs/<crate>/spec.md)
    - CRATE_PATH: PROJECT_DIR/crates/CRATE_NAME

    Mode detection -- check whether CRATE_PATH/Cargo.toml exists:
    - If Cargo.toml does not exist, use create mode.
    - If Cargo.toml exists, use update mode.

    **Create mode** (Cargo.toml does NOT exist -- new crate):
      1. Use the /omnia:guest-writer skill to generate the WASM guest project 
        (src/lib.rs, Cargo.toml, Provider). Run the skill from start to finish;
        do not implement the guest manually. Complete every step in the skill,
        and ensure the skill's verification checklist is satisfied.

      2. Use the /omnia:crate-writer skill to generate the domain crate
        (types, handlers, baseline tests) from OpenSpec artifacts. 
        Run the skill from start to finish; do not implement the crate
        manually. Complete every step in the skill, and ensure the skill's
        verification checklist is satisfied.

      3. Use the /omnia:test-writer skill to generate comprehensive test suites
        from spec scenarios. Run the skill from start to finish; do not implement
        the tests manually. Complete every step in the skill, and ensure the skill's
        verification checklist is satisfied.
      
      4. Verify from CRATE_PATH (repair loop -- max 3 iterations):
           a. cargo fmt --check
              If fails: run cargo fmt, then re-check. Formatting is
              mechanical; one pass should suffice.
           b. cargo clippy -- -D warnings
              If fails: fix each warning using repair-patterns.md
              (clippy section), then re-run clippy.
           c. cargo test
              If fails: analyze each failure and apply the matching
              repair strategy from repair-patterns.md:
              - Type mismatches: update struct definitions, serde attrs
              - Validation errors: fix from_input() or handle() logic
              - Provider mock errors: update MockProvider trait bounds
              - Logic errors: compare handler against artifacts
              Then re-run cargo test.
           Repeat from (a) until all three pass or 3 iterations are
           exhausted. If still failing after 3 iterations: STOP. Do NOT
           mark the task complete. Report the remaining failures with
           error output and ask for guidance.
      
      5. (Optional) /omnia:code-reviewer <CRATE_PATH>
         AI code review for security, WASM constraints, and quality.

    **Update mode** (Cargo.toml exists -- incremental change):
      1. Use the /omnia:crate-writer skill to update the domain crate. Run the
         skill from start to finish; do not implement the crate manually.
         Complete every step in the skill, and ensure the skill's verification
         checklist is satisfied.

      2. Use the /omnia:test-writer skill to regenerate or update tests to match
         changed specs. Run the skill from start to finish; do not implement the
         tests manually. Complete every step in the skill, and ensure the skill's
         verification checklist is satisfied.
         Regenerates or updates tests to match changed specs.
         
      3. Verify from CRATE_PATH (repair loop -- max 3 iterations):
           a. cargo fmt --check
              If fails: run cargo fmt, then re-check.
           b. cargo clippy -- -D warnings
              If fails: fix each warning using repair-patterns.md, re-run.
           c. cargo test
              If fails: analyze each failure, apply the matching repair
              strategy (type mismatch, validation error, provider mock
              error, logic error), re-run.
           Repeat from (a) until all three pass or 3 iterations are
           exhausted. If still failing after 3 iterations: STOP. Do NOT
           mark the task complete. Report failures and ask for guidance.

    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
