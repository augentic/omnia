# Model completion example.
#
# The `model` guest imports `omnia:model/completion` and calls `create`.
# The host serves it with an example-local backend (runtime.rs scripts a fixed
# schema answer through the testkit `Scripted` double), so `create` returns a
# deterministic, validated answer with no live model, no network, and no
# configuration.
#
# The `[[mount]]` preopens the repository root into every guest sandbox as a
# read-only workspace named `.`. The `model` guest reads it via
# `wasi:filesystem/preopens` and lends it through `grants.workspace`. The
# scripted double ignores the workspace (it never runs tools); the host-side
# resolution is proven by the seam suite.
#
# Build the guest first (see README.md), then run from the repository root:
#
#   cargo run --example model -- run --config examples/model/omnia.toml

[[guest]]
id = "model"
source.path = "../../target/wasm32-wasip2/debug/examples/model_wasm.wasm"

# Read-only workspace the `model` guest lends through `grants.workspace`.
# `path` resolves relative to this manifest's directory, so `../..` is the repo
# root; `name = "."` is what `preopens.get-directories()` returns and the guest
# selects on.
[[mount]]
name = "."
path = "../.."
