# Model completion example (rfcs/wasi-model.md).
#
# The `model` guest imports `omnia:model/completion` and calls `create`.
# The host serves it with the in-tree `ModelDefault` (replay) backend: with
# `MODEL_REPLAY_DIR` pointing at the checked-in fixtures, `create` returns the
# recorded, validated answer with no live model and no network.
#
# The `[[mount]]` preopens the repository root into every guest sandbox as a
# read-only workspace named `.`. The `model` guest reads it via
# `wasi:filesystem/preopens` and lends it through `grants.workspace`. The replay
# backend ignores the workspace (Phase 1 short-circuits tools); the host-side
# resolution is proven by the integration test.
#
# Build the guest first (see README.md), then run from the repository root:
#
#   MODEL_REPLAY_DIR=examples/cli-model/fixtures \
#     cargo run --example cli-model -- run --config examples/cli-model/omnia.toml

[[guest]]
id = "model"
source.path = "../../target/wasm32-wasip2/debug/examples/cli_model_wasm.wasm"

# Read-only workspace the `model` guest lends through `grants.workspace`.
# `path` resolves relative to this manifest's directory, so `../..` is the repo
# root; `name = "."` is what `preopens.get-directories()` returns and the guest
# selects on.
[[mount]]
name = "."
path = "../.."
