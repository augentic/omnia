# Model completion example (Phase 1 of rfcs/wasi-model.md).
#
# One guest, `model`, imports `augentic:model/completion` and calls `complete`.
# The host serves it with the in-tree `ModelDefault` (replay) backend: with
# `OMNI_REPLAY_DIR` pointing at the checked-in fixtures, `complete` returns the
# recorded, validated answer with no live model and no network.
#
# Build the guest first (see README.md), then run from the repository root:
#
#   OMNI_REPLAY_DIR=examples/model/fixtures \
#     cargo run --example model -- run --config examples/model/omni.toml

[[guest]]
id = "model"
source.path = "../../target/wasm32-wasip2/debug/examples/model_wasm.wasm"
