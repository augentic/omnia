# Multi-guest HTTP routing.
#
# Two HTTP guests sit behind path prefixes. The host runs a single HTTP server
# and selects the guest per request by longest-prefix match.
#
# Source paths are resolved relative to this file's directory. Build the guests
# first (see README.md), then run from the repository root:
#
#   cargo run --example http-routing -- run --config examples/http-routing/omnia.toml

[[guest]]
id = "a"
source.path = "../../target/wasm32-wasip2/debug/examples/http_routing_a_wasm.wasm"

[[guest]]
id = "b"
source.path = "../../target/wasm32-wasip2/debug/examples/http_routing_b_wasm.wasm"

[[route.http]]
prefix = "/a"
guest = "a"

[[route.http]]
prefix = "/b"
guest = "b"
